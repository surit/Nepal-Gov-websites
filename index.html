<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nepal Government Websites Directory</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🇳🇵 Nepal Government Websites</h1>
      <p class="subtitle">Official .gov.np portals</p>
    </header>

    <!-- Category Navigation -->
    <nav id="category-nav" class="category-nav" aria-label="Categories"></nav>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search sites..." aria-label="Search websites" />

    <!-- Site Grid -->
    <main id="grid" class="grid" aria-live="polite"></main>

    <!-- Community Suggestions -->
    <section class="suggest-section">
      <h2>💡 Missing a website?</h2>
      <p>Help us improve this directory. Suggest a .gov.np site:</p>
      <!-- Replace # with your Google Form link later -->
      <a href="https://forms.gle/stcFLz9tLyjjsvNr9" target="_blank" rel="noopener" class="suggest-btn" id="suggest-link">
        Submit a Website →
      </a>
      <small class="note">We verify all submissions before publishing.</small>
    </section>

    <footer class="disc">
      Unofficial directory • Links go directly to official .gov.np domains
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
